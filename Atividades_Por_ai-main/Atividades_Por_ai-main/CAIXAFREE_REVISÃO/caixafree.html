<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset='utf-8'>
    <title> CAIXA LIVRE </title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .top {
            background: #ffc107;
            text-align: center;
            font-size: 43px;
            font-weight: bold; /* Corrigido de 'blod' para 'bold' */
            border: 2px solid #110c8a;  
        }

        .painel {
            background: #ddd;
            padding: 10px;
            border: 2px solid #110c8a;
        }

        .total {
            font-size: 43px;
            font-weight: bold; /* Corrigido de 'blod' para 'bold' */
            text-align: right; /* Corrigido de 'font-align' para 'text-align' */
        }    

        .btn-custom { /* Mudei para não conflitar com a classe padrão do Bootstrap */
            background: green;
            color: white;
        }
    </style>
</head>
<body class="bg-primary bg-gradient">
    
    <div class="container mt-1">
        <div class="top">Caixa Livre</div>
        <div class="row mt-2">
            <div class="col-md-7">
                <h3 class="text-white"> <span class="badge text-bg-warning"> Sua Compra</span> </h3>
                <ul id="lista" class="list-group"> </ul>
            </div>

            <div class="col-md-5">
                <div class="painel total"> 
                    <h3 class="text-dark"> Total: R$ <span id="total">0,00</span></h3> 
                </div>

                <div class="painel">
                    <label>Código de Barras</label> <input type="text" id="cod" class="form-control"> </div>

                <div class="painel">
                    <label>Quantidade</label>
                    <input type="number" id="qtd" class="form-control" value=1> </div>

                <button class="btn btn-success w-100" onclick="addProduto()"> Adicionar Produto </button>
            </div>
        </div>            
    </div>

</body>

<script src="script.js"></script>
</html>
